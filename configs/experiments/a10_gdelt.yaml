name: tcadv_a10_gdelt
lmca_experiment_config: configs/bridge/a10_gdelt_lmca.yaml
output_dir: outputs/tcadv_a10_gdelt
log_dir: logs/tcadv_a10_gdelt
checkpoint_dir: checkpoints/tcadv_a10_gdelt
metadata:
  runtime_target: A10-24GB-single
  purpose: single_gpu_reduced_full
  seed: 42
tc_adv:
  fusion:
    gamma: 0.7
  loss:
    alpha: 1.0
    beta: 2.5
  gumbel:
    start_temp: 1.0
    anneal_rate: 0.95
    min_temp: 0.05
  trainer:
    generator_lr: 0.001
    discriminator_lr: 0.0005
    max_epochs: 12
    early_stopping_patience: 4
    g_steps: 3
    d_steps: 1
    topk_fake_candidates: 8
    generator_loss_weight: 1.0
    adversarial_loss_weight: 0.1
  trm:
    bandwidth: auto
    epsilon: 0.00001
  ecm:
    num_heads: 4
    hidden_dim: 200
    time_encoding_dim: 32
    history_window: 6
