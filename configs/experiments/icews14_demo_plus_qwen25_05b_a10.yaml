name: tcadv_icews14_demo_plus_qwen25_05b_a10
lmca_experiment_config: ../LMCA-TIC/configs/experiments/icews14_demo_plus_qwen25_05b_a10.yaml
output_dir: outputs/tcadv_icews14_demo_plus_qwen25_05b_a10
log_dir: logs/tcadv_icews14_demo_plus_qwen25_05b_a10
checkpoint_dir: checkpoints/tcadv_icews14_demo_plus_qwen25_05b_a10
metadata:
  runtime_target: A10-24GB-single
  purpose: demo_plus
  offline_mode: true
tc_adv:
  fusion:
    gamma: 0.6
  loss:
    alpha: 1.0
    beta: 2.5
  gumbel:
    start_temp: 1.0
    anneal_rate: 0.95
    min_temp: 0.05
  trainer:
    generator_lr: 0.0003
    discriminator_lr: 0.0002
    max_epochs: 2
    early_stopping_patience: 2
    g_steps: 3
    d_steps: 1
    topk_fake_candidates: 6
  trm:
    bandwidth: auto
    epsilon: 0.00001
  ecm:
    num_heads: 2
    hidden_dim: 128
    time_encoding_dim: 16
    history_window: 5
